# AFTERNOON / FINAL RUN (~4 PM US/Eastern): confirmed lineups → final EV → tracker picks.
# This is the run to use (or wait for) before placing bets.
# Day games may already be started and are skipped.

name: Afternoon — confirmed FINAL (~4 PM ET)

on:
  schedule:
    # 20:00 UTC ≈ 4:00 PM EDT / 3:00 PM EST
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "FINAL plays — confirmed lineups + tracker recording. Date YYYY-MM-DD; blank = today ET."
        required: false
        type: string

jobs:
  lineup-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --config-settings editable_mode=compat

      - name: Set run date (America/New_York)
        id: date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            RUN_DATE="${{ inputs.run_date }}"
          else
            RUN_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          fi
          echo "RUN_DATE=${RUN_DATE}" >> "$GITHUB_ENV"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"

      - name: Restore Savant data from morning run
        id: savant-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/processed/${{ env.RUN_DATE }}
            data/raw/${{ env.RUN_DATE }}
          key: savant-${{ env.RUN_DATE }}

      - name: Ensure morning Savant data is available
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY="data/processed/${RUN_DATE}/pitcher_split_summary.csv"
          if [ -f "$SUMMARY" ]; then
            echo "Savant processed data ready."
            exit 0
          fi

          echo "Cache miss — downloading morning artifact kprop-${RUN_DATE}..."
          RUN_ID=$(gh run list \
            --workflow=daily.yml \
            --status=success \
            --json databaseId \
            --limit 1 \
            --jq '.[0].databaseId // empty')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" -n "kprop-${RUN_DATE}" -D /tmp/morning-artifact || true
            if [ -d "/tmp/morning-artifact/data/processed/${RUN_DATE}" ]; then
              mkdir -p "data/processed"
              cp -r "/tmp/morning-artifact/data/processed/${RUN_DATE}" "data/processed/"
            fi
          fi

          if [ -f "$SUMMARY" ]; then
            echo "Restored processed data from morning artifact."
            exit 0
          fi

          echo "Rebuilding Savant pipeline (morning data unavailable)..."
          python -m mlb_kprop fetch-savant --date "$RUN_DATE"
          python -m mlb_kprop build-features --date "$RUN_DATE"
          python -m mlb_kprop merge-features --date "$RUN_DATE"
          python -m mlb_kprop validate-data --date "$RUN_DATE"

      - name: Run lineup refresh (confirmed lineups)
        run: python -m mlb_kprop run-lineup-refresh --date "$RUN_DATE" --run-mode confirmed

      - name: Commit performance tracker
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker/
          if git diff --staged --quiet; then
            echo "No tracker changes to commit."
          else
            git commit -m "Update K prop tracker (confirmed) for ${RUN_DATE}"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              echo "Tracker push attempt ${attempt} failed; retrying..."
              sleep $((attempt * 5))
            done
            echo "Tracker commit/push failed after 3 attempts."
            exit 1
          fi

      - name: Email confirmed digest
        if: success()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python -m mlb_kprop send-email --date "$RUN_DATE" --run-mode confirmed

      - name: Email failure alert
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python -m mlb_kprop send-failure-email \
            --date "$RUN_DATE" \
            --run-mode confirmed \
            --workflow-label "Afternoon — confirmed FINAL" \
            --run-url "$RUN_URL"

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kprop-confirmed-${{ steps.date.outputs.run_date }}
          retention-days: 14
          path: |
            reports/value_${{ steps.date.outputs.run_date }}.csv
            reports/projections_${{ steps.date.outputs.run_date }}.csv
            data/starters/${{ steps.date.outputs.run_date }}.csv
            data/lines/${{ steps.date.outputs.run_date }}.csv
            data/tracker/ledger.csv
            data/tracker/summary.txt
            data/tracker/side_rollup.csv
          if-no-files-found: warn
