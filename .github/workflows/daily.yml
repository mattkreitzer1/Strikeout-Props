# MORNING RUN (~11 AM US/Eastern): Savant → features → early EV preview email.
# Use this when manually triggering before lineups are confirmed.
# For final plays after lineups post, run "Afternoon — confirmed FINAL" instead.

name: Morning — early preview (~11 AM ET)

on:
  schedule:
    # 15:00 UTC ≈ 11:00 AM EDT / 10:00 AM EST (GitHub cron is UTC-only)
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "MORNING preview — Savant + early EV (lineups may not be final). Date YYYY-MM-DD; blank = today ET."
        required: false
        type: string

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --config-settings editable_mode=compat

      - name: Set run date (America/New_York)
        id: date
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            RUN_DATE="${{ inputs.run_date }}"
          else
            RUN_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          fi
          echo "RUN_DATE=${RUN_DATE}" >> "$GITHUB_ENV"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"

      - name: Run daily pipeline
        run: python -m mlb_kprop run-daily --date "$RUN_DATE" --run-mode early

      - name: Cache Savant data for afternoon refresh
        uses: actions/cache/save@v4
        with:
          path: |
            data/processed/${{ env.RUN_DATE }}
            data/raw/${{ env.RUN_DATE }}
          key: savant-${{ env.RUN_DATE }}

      - name: Commit performance tracker
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker/ data/value_history/
          if git diff --staged --quiet; then
            echo "No tracker changes to commit."
          else
            git commit -m "Update K prop performance tracker for ${RUN_DATE}"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                exit 0
              fi
              echo "Tracker push attempt ${attempt} failed; retrying..."
              sleep $((attempt * 5))
            done
            echo "Tracker commit/push failed after 3 attempts."
            exit 1
          fi

      - name: Email early digest
        if: success()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python -m mlb_kprop send-email --date "$RUN_DATE" --run-mode early

      - name: Email failure alert
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python -m mlb_kprop send-failure-email \
            --date "$RUN_DATE" \
            --run-mode early \
            --workflow-label "Morning — early preview" \
            --run-url "$RUN_URL"

      - name: Upload daily artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kprop-${{ steps.date.outputs.run_date }}
          retention-days: 14
          path: |
            reports/value_${{ steps.date.outputs.run_date }}.csv
            reports/projections_${{ steps.date.outputs.run_date }}.csv
            reports/validation_${{ steps.date.outputs.run_date }}.txt
            reports/savant_fetch_${{ steps.date.outputs.run_date }}.csv
            data/processed/${{ steps.date.outputs.run_date }}/
            data/starters/${{ steps.date.outputs.run_date }}.csv
            data/lines/${{ steps.date.outputs.run_date }}.csv
            data/tracker/ledger.csv
            data/tracker/daily_rollup.csv
            data/tracker/ev_rollup.csv
            data/tracker/side_rollup.csv
            data/tracker/summary.txt
          if-no-files-found: warn
