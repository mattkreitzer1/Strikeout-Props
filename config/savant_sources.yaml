# Custom leaderboards — season zone/chase/whiff context (pitcher arsenal vs batter approach).
# One export per year; build-features combines 2025 + 2026 with PA weighting.
custom_leaderboard:
  - id: pitcher_custom_2025
    kind: custom_leaderboard
    url: "https://baseballsavant.mlb.com/leaderboard/custom?year=2025&type=pitcher&filter=&min=q&selections=pa%2Ck_percent%2Cbb_percent%2Cwhiff_percent%2Cswing_percent%2Czone_percent%2Co_swing_percent%2Cz_swing_percent%2Cwoba%2Cxwoba&chart=false&x=pa&y=pa&r=no&chartType=beeswarm&sort=xwoba&sortDir=asc"
  - id: pitcher_custom_2026
    kind: custom_leaderboard
    url: "https://baseballsavant.mlb.com/leaderboard/custom?year=2026&type=pitcher&filter=&min=q&selections=pa%2Ck_percent%2Cbb_percent%2Cwhiff_percent%2Cswing_percent%2Czone_percent%2Co_swing_percent%2Cz_swing_percent%2Cwoba%2Cxwoba&chart=false&x=pa&y=pa&r=no&chartType=beeswarm&sort=xwoba&sortDir=asc"
