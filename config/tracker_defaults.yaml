# Performance tracker for flagged EV plays (pick != PASS in value sheet).

ledger_path: data/tracker/ledger.csv
summary_path: data/tracker/summary.txt
daily_rollup_path: data/tracker/daily_rollup.csv
ev_rollup_path: data/tracker/ev_rollup.csv
side_rollup_path: data/tracker/side_rollup.csv

# Durable copies of each day's value sheet (survive past 14-day Actions artifacts).
# Used to self-heal the tracker when an afternoon run is missed entirely.
value_history_dir: data/value_history

# Self-healing backfill: each run scans this many prior days and records any
# slate missing from the ledger from its saved value sheet (prefers confirmed,
# falls back to the early sheet so a missed afternoon is not lost).
catch_up_lookback_days: 5
catch_up_allow_early_fallback: true

# Early/late boundary (America/New_York). Pitchers whose game starts before this
# time are recorded by the morning run (the afternoon run is too late — the game
# has started); later games are recorded by the afternoon run. Should match the
# afternoon workflow's scheduled time (~4 PM ET).
early_game_cutoff_et: "16:00"

# Tag picks so rollups stay tied to a model era (Phase 2 + calibration + pitch splits).
model_version: phase2_v1

# Only track rows that were flagged in value-props (respects min_edge there).
track_pass_rows: false

# Grade results grouped by pick_ev at bet time (min inclusive, max exclusive; null = no cap).
ev_buckets:
  - label: "Thin (<5% EV)"
    min_ev: 0.0
    max_ev: 0.05
  - label: "Moderate (5-15% EV)"
    min_ev: 0.05
    max_ev: 0.15
  - label: "Strong (15-25% EV)"
    min_ev: 0.15
    max_ev: 0.25
  - label: "Elite (25%+ EV)"
    min_ev: 0.25
    max_ev: null
