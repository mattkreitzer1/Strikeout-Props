# Performance tracker for flagged EV plays (pick != PASS in value sheet).

ledger_path: data/tracker/ledger.csv
summary_path: data/tracker/summary.txt
daily_rollup_path: data/tracker/daily_rollup.csv
ev_rollup_path: data/tracker/ev_rollup.csv

# Tag picks so rollups stay tied to a model era (Phase 2 + calibration + pitch splits).
model_version: phase2_v1

# Only track rows that were flagged in value-props (respects min_edge there).
track_pass_rows: false

# Grade results grouped by pick_ev at bet time (min inclusive, max exclusive; null = no cap).
ev_buckets:
  - label: "Thin (<5% EV)"
    min_ev: 0.0
    max_ev: 0.05
  - label: "Moderate (5-15% EV)"
    min_ev: 0.05
    max_ev: 0.15
  - label: "Strong (15-25% EV)"
    min_ev: 0.15
    max_ev: 0.25
  - label: "Elite (25%+ EV)"
    min_ev: 0.25
    max_ev: null
